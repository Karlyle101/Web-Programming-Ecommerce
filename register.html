<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
</head>
<body>

<h2>Register</h2>

<form id="registerForm">
  <input type="text" id="fname" placeholder="First Name" required><br>
  <input type="text" id="lname" placeholder="Last Name" required><br>
  <input type="date" id="dob" required><br>

  <select id="gender" required>
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select><br>

  <input type="text" id="phone" placeholder="Phone" required><br>
  <input type="email" id="email" placeholder="Email" required><br>

  <input type="text" id="trn" placeholder="TRN (000-000-000)" required><br>

  <input type="password" id="password" placeholder="Password" required><br>

  <button type="button" onclick="registerUser()">Register</button>
  <button type="reset">Cancel</button>
</form>

<p id="msg"></p>

<script src="auth.js"></script>
</body>
</html>
